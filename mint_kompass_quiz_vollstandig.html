    .question { margin-bottom: 20px; }

<p>Beantworte die Fragen ehrlich – es gibt kein richtig oder falsch.</p>

<button onclick="submitQuiz()">Auswerten</button>

  },

    ]
  },
  {
    text: "Mikrobiologie",
    answers: [
      { text: "Wachstumsraten berechnen", type: "M" },
      { text: "Daten digital erfassen", type: "I" },
      { text: "Proben untersuchen", type: "N" },
      { text: "Geräte warten", type: "T" }
    ]
  },
  {
    text: "Robotik im Alltag",
    answers: [
      { text: "Positionen berechnen", type: "M" },

      { text: "Datensystem entwickeln", type: "I" },
      { text: "Reaktionen untersuchen", type: "N" },
      { text: "Geräte warten", type: "T" }
    ]
  }
];

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

const selectedQuestions = shuffle([...questions]).slice(0, 30);

const quizDiv = document.getElementById("quiz");

selectedQuestions.forEach((q, index) => {
  const shuffledAnswers = shuffle([...q.answers]);

  const div = document.createElement("div");
  div.classList.add("question");

  div.innerHTML = `<p><b>${index + 1}. ${q.text}</b></p>` +
    shuffledAnswers.map(a => `
      <label>
        <input type="radio" name="q${index}" value="${a.type}">
        ${a.text}
      </label><br>
    `).join("");

  quizDiv.appendChild(div);
});

function submitQuiz() {
  const counts = { M: 0, I: 0, N: 0, T: 0 };

  selectedQuestions.forEach((q, index) => {
    const selected = document.querySelector(`input[name="q${index}"]:checked`);
    if (selected) counts[selected.value]++;
  });

  const total = selectedQuestions.length;

  const results = Object.entries(counts).map(([key, value]) => ({
    type: key,
    percent: ((value / total) * 100).toFixed(1)
  }));

  results.sort((a, b) => b.percent - a.percent);

  const names = {
    M: "Mathematik",
    I: "Informatik",
    N: "Naturwissenschaft",
    T: "Technik"
  };

  document.getElementById("result").innerHTML =
    "<h2>Dein Ergebnis:</h2>" +
    results.map(r => `${names[r.type]}: ${r.percent}%`).join("<br>");
}
</script>

</body>
